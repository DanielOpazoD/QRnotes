<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Recordatorio de indicación de fármacos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      color: #333;
    }
    h2 {
      color: #111;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
      background: #f9f9f9;
    }
    .card strong {
      display: inline-block;
      width: 150px;
    }
    ol {
      margin-left: 20px;
    }
    li {
      margin-bottom: 6px;
    }
    button {
      margin: 10px 0;
      padding: 8px 14px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    footer {
      margin-top: 40px;
      font-size: 12px;
      color: gray;
      border-top: 1px dashed #ccc;
      padding-top: 10px;
    }
  </style>
</head>
<body>
  <h2>Recordatorio de indicación de fármacos</h2>

  <div class="card">
    <strong>Nombre y Apellido:</strong> <span id="nombre">—</span><br>
    <strong>RUT:</strong> <span id="rut">—</span><br>
    <strong>Fecha:</strong> <span id="fecha">—</span>
  </div>

  <h3>Medicamentos</h3>
  <ol id="listaMedicamentos"></ol>

  <button onclick="window.print()">Imprimir / Guardar PDF</button>

  <footer>
    Esta hoja es un recordatorio personal. Ante dudas o eventos adversos, consulte a su médico tratante.
  </footer>

  <script>
    // Obtener parámetros de la URL
    const params = new URLSearchParams(window.location.search);
    document.getElementById("nombre").textContent = params.get("nombre") || "—";
    document.getElementById("rut").textContent = params.get("rut") || "—";

    const fechaParam = params.get("fecha");
    let fechaMostrada = "—";
    if (fechaParam) {
      const partes = fechaParam.replace(/\//g, "-").split("-");
      if (partes.length === 3) {
        const [mes, dia, anio] = partes;
        fechaMostrada = `${dia.padStart(2, "0")}-${mes.padStart(2, "0")}-${anio}`;
      } else {
        fechaMostrada = fechaParam;
      }
    }
    document.getElementById("fecha").textContent = fechaMostrada;

    const meds = params.get("meds")?.split("||") || [];
    const lista = document.getElementById("listaMedicamentos");
    lista.innerHTML = "";
    meds.forEach(med => {
      const li = document.createElement("li");
      li.textContent = med.trim();
      lista.appendChild(li);
    });
  </script>
</body>
</html>
